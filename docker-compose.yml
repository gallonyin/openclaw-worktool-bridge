services:
  mysql:
    image: mysql:8.4
    container_name: worktool-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-worktool_bridge}
      MYSQL_USER: ${MYSQL_USER:-worktool}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    networks:
      - worktool-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: worktool-backend
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      APP_MYSQL_HOST: ${APP_MYSQL_HOST:-}
      APP_MYSQL_PORT: ${APP_MYSQL_PORT:-3306}
      APP_MYSQL_USER: ${APP_MYSQL_USER:-}
      APP_MYSQL_PASSWORD: ${APP_MYSQL_PASSWORD:-}
      APP_MYSQL_DATABASE: ${APP_MYSQL_DATABASE:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      AUTH_JWT_EXPIRE_DAYS: ${AUTH_JWT_EXPIRE_DAYS:-30}
      AUTH_PBKDF2_ITERATIONS: ${AUTH_PBKDF2_ITERATIONS:-390000}
      AUTH_SMS_ENABLED: ${AUTH_SMS_ENABLED:-false}
      ENABLE_TROUBLESHOOT: ${ENABLE_TROUBLESHOOT:-false}
      ENABLE_RUNTIME_WORKTOOL_SETTINGS: ${ENABLE_RUNTIME_WORKTOOL_SETTINGS:-false}
      WORKTOOL_API_BASE: ${WORKTOOL_API_BASE:-}
      CALLBACK_PUBLIC_BASE_URL: ${CALLBACK_PUBLIC_BASE_URL:-}
      ADMIN_PHONE_WHITELIST: ${ADMIN_PHONE_WHITELIST:-}
      WORKTOOL_DB_HOST: ${WORKTOOL_DB_HOST:-}
      WORKTOOL_DB_PORT: ${WORKTOOL_DB_PORT:-3306}
      WORKTOOL_DB_USER: ${WORKTOOL_DB_USER:-}
      WORKTOOL_DB_PASSWORD: ${WORKTOOL_DB_PASSWORD:-}
      WORKTOOL_DB_NAME: ${WORKTOOL_DB_NAME:-}
      SMS_HUARUI_API_URL: ${SMS_HUARUI_API_URL:-}
      SMS_HUARUI_APPKEY: ${SMS_HUARUI_APPKEY:-}
      SMS_HUARUI_APPSECRET: ${SMS_HUARUI_APPSECRET:-}
      SMS_HUARUI_SIGN: ${SMS_HUARUI_SIGN:-【南京亚美达科技】}
      SMS_CODE_EXPIRE_MINUTES: ${SMS_CODE_EXPIRE_MINUTES:-15}
      DEFAULT_TEST_PROVIDER_ENABLED: ${DEFAULT_TEST_PROVIDER_ENABLED:-false}
      DEFAULT_TEST_PROVIDER_NAME: ${DEFAULT_TEST_PROVIDER_NAME:-AI模型(仅测试用)}
      DEFAULT_TEST_PROVIDER_BASE_URL: ${DEFAULT_TEST_PROVIDER_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v3/chat/completions}
      DEFAULT_TEST_PROVIDER_API_KEY: ${DEFAULT_TEST_PROVIDER_API_KEY:-}
      DEFAULT_TEST_PROVIDER_MODEL: ${DEFAULT_TEST_PROVIDER_MODEL:-doubao-seed-2.0-lite}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    networks:
      - worktool-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worktool-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-8080}:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"
    networks:
      - worktool-net

networks:
  worktool-net:
    driver: bridge

volumes:
  mysql_data:
    name: worktool_mysql_data
